services:
  postgres:
    image: postgres:15-alpine
    container_name: test_microservice_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  activemq:
    image: apache/activemq-classic:6.1.2
    container_name: test_microservice_activemq
    ports:
      - "61616:61616"
      - "8161:8161"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: test_microservice_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: test_microservice_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  email-service:
    build:
      context: ./email-service
    container_name: test_microservice_email-service
    ports:
      - "8083:8083"

  auth-service:
    build:
      context: ./auth-service
    container_name: test_microservice_auth-service
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/auth_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
    depends_on:
      postgres:
        condition: service_healthy

  account-service:
    build:
      context: ./account-service
    container_name: test_microservice_account-service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/acct_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - EMAIL_SERVICE_URL=http://email-service:8083
      - SPRING_ACTIVEMQ_IN_MEMERY=false
      - SPRING_ACTIVEMQ_BROKER_URL=tcp://activemq:61616
      - SPRING_ACTIVEMQ_USER=admin
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
      activemq:
        condition: service_started

  aggregator-service:
    build:
      context: ./aggregator-service
    container_name: test_microservice_aggregator-service
    ports:
      - "8082:8082"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - ACCOUNT_SERVICE_URL=http://account-service:8080
      - REPORT_SERVICE_URL=http://report-service:8086
    depends_on:
      auth-service:
        condition: service_started
      account-service:
        condition: service_started
      report-service:
        condition: service_started

  mongodb:
    image: mongo:6.0
    container_name: test_microservice_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  audit-service:
    build:
      context: ./audit-service
    container_name: test_microservice_audit-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/audit_db
    depends_on:
      mongodb:
        condition: service_started

  db2:
    image: ibmcom/db2:11.5.8.0
    container_name: test_microservice_db2
    privileged: true
    ports:
      - "50000:50000"
    environment:
      - LICENSE=accept
      - DB2INST1_PASSWORD=db2pwd
      - DBNAME=histdb
    volumes:
      - db2-data:/database
    healthcheck:
      test: ["CMD-SHELL", "su - db2inst1 -c 'db2pd - | grep -q Active'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  history-service:
    build:
      context: ./history-service
    container_name: test_microservice_history-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:db2://db2:50000/histdb
      - SPRING_DATASOURCE_USERNAME=db2inst1
      - SPRING_DATASOURCE_PASSWORD=db2pwd
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      db2:
        condition: service_healthy
      kafka:
        condition: service_started

  oracle-db:
    image: gvenzl/oracle-free:slim
    container_name: test_microservice_oracle
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=oraclepwd
      - APP_USER=report_user
      - APP_USER_PASSWORD=reportpwd
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "/opt/oracle/checkDBStatus.sh"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  report-service:
    build:
      context: ./report-service
    container_name: test_microservice_report-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=report_user
      - SPRING_DATASOURCE_PASSWORD=reportpwd
    depends_on:
      oracle-db:
        condition: service_healthy

  legacy-service:
    build:
      context: ./legacy-service
    container_name: test_microservice_legacy-service
    ports:
      - "8087:8080"

  soa-service:
    build:
      context: ./soa-service
    container_name: test_microservice_soa-service
    ports:
      - "8088:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_USERNAME=report_user
      - SPRING_DATASOURCE_PASSWORD=reportpwd
    depends_on:
      oracle-db:
        condition: service_healthy

volumes:
  postgres-data:
  mongodb-data:
  db2-data:
  oracle-data:
